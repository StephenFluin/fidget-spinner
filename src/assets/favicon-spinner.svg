<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true">
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Connected spinner body to create one curved silhouette -->
    <path d="M32 31 L32 14 M32 31 L47 40 M32 31 L17 40" stroke="#161616" stroke-width="13.5"/>

    <!-- Outer lobe shells and center cap shell -->
    <circle cx="32" cy="14" r="11" fill="#161616"/>
    <circle cx="47" cy="40" r="11" fill="#161616"/>
    <circle cx="17" cy="40" r="11" fill="#161616"/>
    <circle cx="32" cy="32" r="9.5" fill="#161616"/>

    <!-- Three red bearing rings -->
    <circle cx="32" cy="14" r="7" fill="#c83a2d"/>
    <circle cx="47" cy="40" r="7" fill="#c83a2d"/>
    <circle cx="17" cy="40" r="7" fill="#c83a2d"/>

    <!-- Metallic inner race -->
    <circle cx="32" cy="14" r="4.8" fill="#c9ced4"/>
    <circle cx="47" cy="40" r="4.8" fill="#c9ced4"/>
    <circle cx="17" cy="40" r="4.8" fill="#c9ced4"/>

    <!-- Bearing holes and center cap detail -->
    <circle cx="32" cy="14" r="3.1" fill="#0e0e0e"/>
    <circle cx="47" cy="40" r="3.1" fill="#0e0e0e"/>
    <circle cx="17" cy="40" r="3.1" fill="#0e0e0e"/>
    <circle cx="32" cy="32" r="5.9" fill="#1f1f1f"/>
    <circle cx="32" cy="32" r="4.2" fill="#0f0f0f"/>

    <!-- Subtle perimeter to sharpen favicon at small sizes -->
    <circle cx="32" cy="14" r="10.9" stroke="#050505" stroke-width="0.8"/>
    <circle cx="47" cy="40" r="10.9" stroke="#050505" stroke-width="0.8"/>
    <circle cx="17" cy="40" r="10.9" stroke="#050505" stroke-width="0.8"/>
  </g>
</svg>
